<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>信号不要断｜联通沃派 · 校园通信任务</title>
  <style>
    :root {
      --wo-red: #E60027;
      --ink: #231F20;
      --blue-0: #06101f;
      --blue-1: #092c63;
      --blue-2: #106cff;
      --cyan: #42e8ff;
      --cyan-soft: rgba(66, 232, 255, .52);
      --white: #f2fbff;
      --muted: rgba(242, 251, 255, .68);
      --glass: rgba(255,255,255,.105);
      --glass-2: rgba(255,255,255,.16);
      --line: rgba(66,232,255,.62);
      --danger: #ffb6c1;
      --good: #78ffcc;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #030813;
      color: var(--white);
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
    }

    #app {
      position: relative;
      width: min(100vw, 480px);
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 8%, rgba(230, 0, 39, .24), transparent 30%),
        radial-gradient(circle at 14% 76%, rgba(66, 232, 255, .22), transparent 32%),
        linear-gradient(160deg, #06101f 0%, #092c63 48%, #050a15 100%);
      box-shadow: 0 0 80px rgba(0,0,0,.45);
      isolation: isolate;
    }

    #app::before {
      content: "";
      position: absolute;
      inset: -20%;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 32px 32px;
      transform: perspective(560px) rotateX(64deg) translateY(22%);
      transform-origin: center bottom;
      z-index: -3;
      opacity: .62;
    }

    #app::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 28%, rgba(255,255,255,.12) 0 1px, transparent 2px),
        radial-gradient(circle at 22% 82%, rgba(66,232,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 72%, rgba(230,0,39,.18) 0 1px, transparent 2px);
      background-size: 170px 190px;
      animation: floatStars 11s linear infinite;
      z-index: -2;
    }

    @keyframes floatStars {
      from { transform: translateY(0); }
      to { transform: translateY(-38px); }
    }

    .screen {
      position: absolute;
      inset: 0;
      padding: max(16px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      transform: translateX(20px);
      animation: enter .38s ease forwards;
    }

    @keyframes enter {
      to { opacity: 1; transform: translateX(0); }
    }

    .topbar {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .brand-pill {
      height: 34px;
      min-width: 106px;
      display: grid;
      place-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      border: 1px solid rgba(255,255,255,.24);
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
      overflow: hidden;
    }

    .brand-pill img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .progress {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: var(--p, 0%);
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), #fff, var(--wo-red));
      border-radius: 999px;
      box-shadow: 0 0 18px rgba(66,232,255,.55);
      transition: width .3s ease;
    }

    .music-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #fff;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
    }

    .panel {
      position: relative;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.075));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: radial-gradient(circle at 10% 0%, rgba(255,255,255,.22), transparent 30%);
      pointer-events: none;
    }

    .hero {
      flex: 1;
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
    }

    .content {
      z-index: 3;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(66,232,255,.25);
      background: rgba(255,255,255,.08);
      color: rgba(242,251,255,.78);
      font-size: 12px;
      letter-spacing: .06em;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    .title {
      font-size: clamp(34px, 11vw, 52px);
      line-height: .98;
      font-weight: 950;
      letter-spacing: -.07em;
      text-shadow: 0 0 34px rgba(66,232,255,.25);
    }

    .title em {
      color: #fff;
      font-style: normal;
      text-shadow: 0 0 26px rgba(230,0,39,.35);
    }

    .subtitle {
      margin-top: 13px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.78;
    }

    .small {
      color: rgba(242,251,255,.58);
      font-size: 12px;
      line-height: 1.6;
    }

    .btns {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      min-height: 52px;
      border-radius: 18px;
      color: #071023;
      font-weight: 900;
      letter-spacing: .02em;
      background: linear-gradient(135deg, #fff 0%, #92f3ff 40%, var(--wo-red) 100%);
      box-shadow: 0 14px 32px rgba(230,0,39,.22), 0 10px 26px rgba(66,232,255,.18);
      transition: transform .15s ease, filter .15s ease;
    }

    .btn:active {
      transform: scale(.985);
      filter: brightness(.95);
    }

    .btn.secondary {
      color: var(--white);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.2);
      box-shadow: none;
    }

    .city {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 32%;
      opacity: .72;
      pointer-events: none;
    }

    .building {
      position: absolute;
      bottom: 0;
      border: 1px solid rgba(66,232,255,.12);
      border-radius: 9px 9px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
    }

    .building::before {
      content: "";
      position: absolute;
      inset: 13px 9px;
      background:
        repeating-linear-gradient(90deg, rgba(66,232,255,.24) 0 5px, transparent 5px 16px),
        repeating-linear-gradient(0deg, transparent 0 18px, rgba(255,255,255,.08) 18px 20px);
    }

    .b1 { left: 5%; width: 26%; height: 54%; }
    .b2 { left: 35%; width: 22%; height: 40%; }
    .b3 { right: 7%; width: 30%; height: 62%; }

    .signal-orb {
      width: 176px;
      height: 176px;
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.95) 0 8px, rgba(66,232,255,.38) 9px 28px, transparent 29px),
        radial-gradient(circle at 50% 50%, rgba(230,0,39,.22), transparent 58%);
      box-shadow: 0 0 60px rgba(66,232,255,.34);
    }

    .signal-orb span {
      position: absolute;
      inset: 26px;
      border-radius: 50%;
      border: 1px solid rgba(66,232,255,.42);
      animation: pulse 1.8s ease-out infinite;
    }

    .signal-orb span:nth-child(2) { animation-delay: .45s; }
    .signal-orb span:nth-child(3) { animation-delay: .9s; }

    @keyframes pulse {
      from { transform: scale(.4); opacity: .9; }
      to { transform: scale(1.9); opacity: 0; }
    }

    .phone {
      width: 236px;
      min-height: 390px;
      padding: 16px;
      border-radius: 38px;
      background: linear-gradient(160deg, #141a28, #060b15);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 30px 70px rgba(0,0,0,.45), inset 0 0 0 8px rgba(255,255,255,.03);
      position: relative;
    }

    .phone::before {
      content: "";
      width: 76px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.28);
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
    }

    .chat {
      margin-top: 24px;
      display: grid;
      gap: 10px;
    }

    .bubble {
      max-width: 86%;
      padding: 10px 12px;
      border-radius: 16px;
      color: #fff;
      font-size: 12px;
      line-height: 1.55;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.12);
    }

    .bubble.me {
      justify-self: end;
      background: linear-gradient(135deg, rgba(66,232,255,.28), rgba(230,0,39,.24));
    }

    .bubble.signal {
      justify-self: center;
      border-radius: 999px;
      color: rgba(242,251,255,.72);
      font-size: 11px;
    }

    .game-card {
      flex: 1;
      min-height: 0;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .game-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .game-title {
      font-size: 20px;
      line-height: 1.24;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .timer {
      min-width: 58px;
      padding: 6px 8px;
      border-radius: 999px;
      text-align: center;
      color: #071023;
      background: #fff;
      font-weight: 900;
      font-size: 12px;
    }

    .game-tip {
      color: rgba(242,251,255,.68);
      font-size: 12px;
      line-height: 1.55;
    }

    .map {
      position: relative;
      flex: 1;
      min-height: 300px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(230,0,39,.16), transparent 24%),
        radial-gradient(circle at 72% 76%, rgba(66,232,255,.18), transparent 28%),
        linear-gradient(160deg, rgba(5,14,30,.92), rgba(13,45,94,.76));
      border: 1px solid rgba(255,255,255,.12);
      overflow: hidden;
      touch-action: none;
    }

    .map::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: .75;
    }

    .road {
      position: absolute;
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      transform-origin: left center;
      filter: blur(.1px);
    }

    .node {
      position: absolute;
      width: 62px;
      height: 62px;
      margin: -31px 0 0 -31px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #fff;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(66,232,255,.28);
      box-shadow: 0 0 20px rgba(66,232,255,.14);
      z-index: 5;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .node strong {
      font-size: 20px;
      line-height: 1;
    }

    .node span {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      color: rgba(242,251,255,.7);
    }

    .node.active {
      transform: scale(1.07);
      border-color: var(--cyan);
      background: rgba(66,232,255,.18);
      box-shadow: 0 0 26px rgba(66,232,255,.35);
    }

    .node.target {
      border-color: var(--wo-red);
      background: rgba(230,0,39,.18);
      animation: targetPing 1s ease-in-out infinite alternate;
    }

    .node.done {
      border-color: rgba(120,255,204,.7);
      background: rgba(120,255,204,.12);
    }

    @keyframes targetPing {
      from { box-shadow: 0 0 14px rgba(230,0,39,.22); }
      to { box-shadow: 0 0 30px rgba(230,0,39,.58); }
    }

    .wire-svg {
      position: absolute;
      inset: 0;
      z-index: 3;
      overflow: visible;
      pointer-events: none;
    }

    .wire-svg line, .wire-svg path {
      stroke: var(--line);
      stroke-width: 4;
      stroke-linecap: round;
      filter: drop-shadow(0 0 8px rgba(66,232,255,.6));
    }

    .wire-svg .temp {
      stroke: rgba(255,255,255,.7);
      stroke-dasharray: 8 8;
    }

    .signal-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 16px rgba(66,232,255,.9);
      z-index: 4;
      opacity: 0;
    }

    .interference {
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      left: 50%;
      top: 46%;
      margin: -46px 0 0 -46px;
      background: repeating-linear-gradient(45deg, rgba(230,0,39,.16) 0 8px, rgba(230,0,39,.03) 8px 16px);
      border: 1px solid rgba(230,0,39,.25);
      animation: fog 2s ease-in-out infinite alternate;
      z-index: 2;
    }

    @keyframes fog {
      to { transform: scale(1.08) rotate(4deg); opacity: .75; }
    }

    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
      align-content: center;
      padding: 12px;
    }

    .study-chip {
      min-height: 76px;
      border-radius: 18px;
      color: #fff;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.14);
      padding: 10px;
      text-align: left;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .study-chip:active {
      transform: scale(.98);
    }

    .study-chip.correct {
      border-color: rgba(120,255,204,.6);
      background: rgba(120,255,204,.13);
    }

    .study-chip.wrong {
      border-color: rgba(230,0,39,.72);
      background: rgba(230,0,39,.14);
      animation: shake .22s ease;
    }

    @keyframes shake {
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .study-chip strong {
      display: block;
      font-size: 13px;
    }

    .study-chip span {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(242,251,255,.62);
    }

    .sequence {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .seq-dot {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 11px;
      color: rgba(242,251,255,.6);
    }

    .seq-dot.on {
      color: #06101f;
      background: #fff;
    }

    .rhythm-stage {
      position: relative;
      flex: 1;
      min-height: 300px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 72%, rgba(230,0,39,.22), transparent 28%),
        linear-gradient(180deg, rgba(5,14,30,.92), rgba(13,45,94,.74));
      border: 1px solid rgba(255,255,255,.13);
      overflow: hidden;
      touch-action: manipulation;
    }

    .stage-phone {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 132px;
      height: 180px;
      transform: translateX(-50%);
      border-radius: 28px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      display: grid;
      place-items: center;
      box-shadow: 0 0 40px rgba(66,232,255,.15);
    }

    .stage-phone::before {
      content: "AI视频彩铃";
      position: absolute;
      top: 12px;
      font-size: 11px;
      color: rgba(242,251,255,.65);
    }

    .video-face {
      width: 86px;
      height: 86px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(66,232,255,.28), rgba(230,0,39,.35));
      font-size: 38px;
    }

    .beat {
      position: absolute;
      left: 50%;
      top: -24px;
      width: 38px;
      height: 38px;
      margin-left: -19px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 18px rgba(66,232,255,.85);
      animation: fall 1.18s linear forwards;
      z-index: 3;
    }

    @keyframes fall {
      to { top: calc(100% - 112px); transform: scale(.82); }
    }

    .tap-zone {
      position: absolute;
      left: 50%;
      bottom: 86px;
      width: 96px;
      height: 96px;
      margin-left: -48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.68);
      box-shadow: 0 0 24px rgba(66,232,255,.42), inset 0 0 22px rgba(66,232,255,.12);
      z-index: 2;
    }

    .combo {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 8px 10px;
      border-radius: 999px;
      color: #071023;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      z-index: 4;
    }

    .upload-map {
      position: relative;
      flex: 1;
      min-height: 310px;
      border-radius: 24px;
      background: linear-gradient(160deg, rgba(5,14,30,.92), rgba(13,45,94,.78));
      border: 1px solid rgba(255,255,255,.13);
      overflow: hidden;
      touch-action: none;
    }

    .cloud-zone {
      position: absolute;
      right: 18px;
      top: 52px;
      width: 132px;
      height: 116px;
      border-radius: 44px;
      display: grid;
      place-items: center;
      text-align: center;
      color: rgba(242,251,255,.86);
      background: radial-gradient(circle at 50% 48%, rgba(255,255,255,.2), rgba(66,232,255,.12));
      border: 1px dashed rgba(255,255,255,.42);
      box-shadow: 0 0 36px rgba(66,232,255,.18);
    }

    .cloud-zone.ready {
      border-color: rgba(120,255,204,.85);
      background: radial-gradient(circle at 50% 48%, rgba(120,255,204,.22), rgba(66,232,255,.12));
    }

    .memory-card {
      position: absolute;
      left: 18px;
      width: 118px;
      min-height: 62px;
      padding: 10px;
      border-radius: 18px;
      color: #fff;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.17);
      box-shadow: 0 12px 24px rgba(0,0,0,.18);
      z-index: 6;
      touch-action: none;
      transition: transform .12s ease, opacity .2s ease;
    }

    .memory-card strong {
      display: block;
      font-size: 13px;
    }

    .memory-card span {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      color: rgba(242,251,255,.62);
    }

    .memory-card.done {
      opacity: .45;
      pointer-events: none;
      transform: scale(.92);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }

    .stat {
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }

    .stat strong {
      display: block;
      font-size: 20px;
      color: #fff;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: rgba(242,251,255,.62);
    }

    .result-card {
      padding: 18px;
      transform-style: preserve-3d;
      animation: flipin .8s ease both;
    }

    @keyframes flipin {
      from { transform: rotateY(88deg); opacity: .3; }
      to { transform: rotateY(0); opacity: 1; }
    }

    .result-title {
      font-size: 30px;
      line-height: 1.1;
      font-weight: 950;
      letter-spacing: -.05em;
    }

    .service-tag {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      color: #071023;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .share-poster {
      padding: 18px;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(18px);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(2,8,18,.82);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      font-size: 12px;
      opacity: 0;
      z-index: 99;
      pointer-events: none;
      transition: all .22s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .end-logo {
      width: 226px;
      height: 86px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: rgba(255,255,255,.96);
      padding: 12px;
      box-shadow: 0 20px 45px rgba(0,0,0,.28);
      margin: 0 auto;
    }

    .end-logo img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .wave-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: .6;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 42px, rgba(66,232,255,.14) 43px 44px, transparent 45px 78px, rgba(230,0,39,.12) 79px 80px, transparent 81px 112px);
      animation: zoomWave 2s ease-in-out infinite alternate;
    }

    @keyframes zoomWave {
      to { transform: scale(1.08); opacity: .9; }
    }


    /* ===== 升级版第2关：求助信号破译 ===== */
    .decode-stage {
      position: relative;
      flex: 1;
      min-height: 318px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 34%, rgba(230,0,39,.18), transparent 24%),
        radial-gradient(circle at 50% 70%, rgba(66,232,255,.16), transparent 32%),
        linear-gradient(160deg, rgba(5,14,30,.92), rgba(13,45,94,.78));
      border: 1px solid rgba(255,255,255,.13);
      overflow: hidden;
      touch-action: none;
    }

    .noise-orb {
      position: absolute;
      left: 50%;
      top: 42%;
      width: 178px;
      height: 178px;
      margin: -89px 0 0 -89px;
      border-radius: 50%;
      background:
        repeating-linear-gradient(35deg, rgba(255,255,255,.18) 0 5px, rgba(66,232,255,.08) 5px 12px, rgba(230,0,39,.12) 12px 18px),
        radial-gradient(circle, rgba(255,255,255,.22), rgba(66,232,255,.08));
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 0 42px rgba(66,232,255,.24);
      display: grid;
      place-items: center;
      color: rgba(242,251,255,.8);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      animation: noiseFloat 1.2s ease-in-out infinite alternate;
      z-index: 4;
    }

    @keyframes noiseFloat {
      to { transform: scale(1.035) rotate(3deg); filter: brightness(1.1); }
    }

    .scratch-trail {
      position: absolute;
      width: 18px;
      height: 18px;
      margin: -9px 0 0 -9px;
      border-radius: 50%;
      background: rgba(255,255,255,.86);
      box-shadow: 0 0 20px rgba(66,232,255,.9);
      z-index: 6;
      pointer-events: none;
      animation: trailFade .45s ease forwards;
    }

    @keyframes trailFade {
      to { transform: scale(2.2); opacity: 0; }
    }

    .decode-meter {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      overflow: hidden;
      z-index: 8;
    }

    .decode-meter span {
      display: block;
      width: var(--v, 0%);
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), #fff, var(--wo-red));
      transition: width .18s ease;
    }

    .keyword-bank {
      position: absolute;
      inset: 12px;
      display: none;
      z-index: 9;
    }

    .keyword-bank.show {
      display: block;
    }

    .key-chip {
      position: absolute;
      width: 78px;
      min-height: 48px;
      padding: 8px;
      border-radius: 16px;
      color: #fff;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      z-index: 12;
      touch-action: none;
    }

    .key-chip.good {
      border-color: rgba(66,232,255,.42);
      box-shadow: 0 0 22px rgba(66,232,255,.2);
    }

    .key-chip.bad {
      color: rgba(242,251,255,.45);
      background: rgba(255,255,255,.055);
      border-color: rgba(255,255,255,.08);
      filter: grayscale(.8);
    }

    .key-chip.locked {
      opacity: .52;
      pointer-events: none;
      transform: scale(.9);
    }

    .signal-slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-top: 8px;
    }

    .slot {
      height: 46px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,.28);
      display: grid;
      place-items: center;
      color: rgba(242,251,255,.42);
      font-size: 11px;
      background: rgba(255,255,255,.065);
    }

    .slot.filled {
      border-style: solid;
      border-color: rgba(120,255,204,.58);
      color: #06101f;
      background: rgba(255,255,255,.94);
      font-weight: 900;
    }

    .decoded-reply {
      display: none;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(120,255,204,.25);
      color: rgba(242,251,255,.78);
      font-size: 12px;
      line-height: 1.65;
    }

    .decoded-reply.show {
      display: block;
      animation: enter .35s ease forwards;
    }

    /* ===== 升级版第4关：毕业前最后一次接力 ===== */
    .grad-stage {
      position: relative;
      flex: 1;
      min-height: 330px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.09), transparent 22%),
        radial-gradient(circle at 78% 80%, rgba(230,0,39,.14), transparent 26%),
        linear-gradient(160deg, rgba(5,14,30,.92), rgba(13,45,94,.78));
      border: 1px solid rgba(255,255,255,.13);
      overflow: hidden;
      touch-action: none;
    }

    .photo-frame {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 14px;
      height: 184px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06)),
        radial-gradient(circle at 50% 100%, rgba(66,232,255,.13), transparent 55%);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18);
    }

    .avatar {
      position: absolute;
      width: 54px;
      height: 62px;
      margin: -27px 0 0 -27px;
      border-radius: 22px 22px 18px 18px;
      display: grid;
      place-items: center;
      text-align: center;
      color: rgba(242,251,255,.78);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 0 20px rgba(66,232,255,.08);
      z-index: 5;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .avatar strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .avatar span {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      color: rgba(242,251,255,.58);
    }

    .avatar.done {
      transform: scale(1.08);
      color: #fff;
      border-color: rgba(120,255,204,.7);
      background: rgba(120,255,204,.14);
      box-shadow: 0 0 26px rgba(120,255,204,.28);
    }

    .grad-svg {
      position: absolute;
      inset: 0;
      z-index: 3;
      overflow: visible;
      pointer-events: none;
    }

    .grad-svg line {
      stroke: rgba(120,255,204,.56);
      stroke-width: 3;
      stroke-dasharray: 6 8;
      filter: drop-shadow(0 0 8px rgba(120,255,204,.45));
      animation: dash 1.2s linear infinite;
    }

    .message-bank {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      z-index: 10;
    }

    .msg-card {
      min-height: 50px;
      padding: 8px 9px;
      border-radius: 16px;
      color: #fff;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
      font-size: 11px;
      line-height: 1.38;
      touch-action: none;
      z-index: 15;
    }

    .msg-card.done {
      opacity: .42;
      pointer-events: none;
      transform: scale(.94);
    }

    .final-hold {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 25;
      background: rgba(3,8,19,.78);
      backdrop-filter: blur(8px);
      padding: 18px;
      place-items: center;
      text-align: center;
    }

    .final-hold.show {
      display: grid;
      animation: enter .35s ease forwards;
    }

    .hold-circle {
      position: relative;
      width: 156px;
      height: 156px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 18px auto;
      color: #06101f;
      font-weight: 950;
      background: conic-gradient(var(--wo-red) var(--hold, 0%), rgba(255,255,255,.16) 0);
      box-shadow: 0 0 42px rgba(230,0,39,.25);
    }

    .hold-circle::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: #fff;
    }

    .hold-circle span {
      position: relative;
      z-index: 2;
    }

    @media (max-height: 710px) {
      .title { font-size: 35px; }
      .phone { transform: scale(.86); }
      .game-card { padding: 12px; }
      .map, .rhythm-stage, .upload-map { min-height: 268px; }
      .subtitle { font-size: 13px; line-height: 1.62; }
    }
  
    /* ===== FINAL UI POLISH：上传前视觉优化 ===== */
    :root {
      --bg-deep: #030712;
      --bg-card: rgba(255,255,255,.118);
      --bg-card-strong: rgba(255,255,255,.18);
      --stroke-soft: rgba(255,255,255,.18);
      --stroke-blue: rgba(66,232,255,.36);
      --stroke-red: rgba(230,0,39,.34);
      --text-main: #F5FBFF;
      --text-sub: rgba(245,251,255,.72);
    }

    #app {
      background:
        radial-gradient(circle at 50% -8%, rgba(230,0,39,.34), transparent 29%),
        radial-gradient(circle at 10% 24%, rgba(66,232,255,.20), transparent 28%),
        radial-gradient(circle at 92% 78%, rgba(230,0,39,.18), transparent 30%),
        linear-gradient(155deg, #030712 0%, #071733 38%, #092c63 66%, #030712 100%);

    #app::before {

    #app::after {
      opacity: .72;
      background:
        radial-gradient(circle at 20% 16%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 78% 22%, rgba(255,255,255,.15) 0 1px, transparent 2px),
        radial-gradient(circle at 14% 82%, rgba(66,232,255,.22) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 74%, rgba(230,0,39,.22) 0 1px, transparent 2px);
      background-size: 160px 180px;
    }

    .screen {
      padding-left: 17px;
      padding-right: 17px;
    }

    .topbar {
      height: 42px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
    }

    .brand-pill {
      height: 32px;
      min-width: 118px;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.34);

    .progress {
      height: 7px;
      background: rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }

    .progress span {
      background: linear-gradient(90deg, #42e8ff 0%, #ffffff 44%, #E60027 100%);

    .music-btn {
      width: 32px;
      height: 32px;
      color: #071023;
      background: linear-gradient(135deg, #fff, #dffbff);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
    }

    .panel {
      background:
        linear-gradient(180deg, rgba(255,255,255,.17), rgba(255,255,255,.075)),
        radial-gradient(circle at 15% 0%, rgba(66,232,255,.12), transparent 30%);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        0 24px 60px rgba(0,0,0,.36),
        inset 0 1px 0 rgba(255,255,255,.22),
        inset 0 0 0 1px rgba(66,232,255,.035);

    .panel::after {
      content: "";

      inset: 0;

    .eyebrow {
      position: relative;
      z-index: 1;

    }

    .title {

        linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(183,249,255,1) 40%, rgba(230,0,39,1) 100%);
      box-shadow:
        0 16px 34px rgba(230,0,39,.24),

    .btn.secondary {

    .signal-orb {

    .signal-orb::before {

    .phone {

    .map, .decode-stage, .rhythm-stage, .grad-stage {

        radial-gradient(circle at 20% 16%, rgba(230,0,39,.18), transparent 25%),

    .final-hold {

    }

    .hold-circle {

    .result-card {

    .result-title {

    }

    .service-tag {

      border: 1px solid rgba(255,255,255,.62);
      box-shadow: 0 8px 20px rgba(0,0,0,.15);
    }

    .stat {
      background:

    function toast(text) {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = text;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1350);
    }

    function centerOf(el, box) {
      const r = el.getBoundingClientRect();
      const b = box.getBoundingClientRect();
      return { x: r.left + r.width / 2 - b.left, y: r.top + r.height / 2 - b.top };
    }

    function pointIn(el, clientX, clientY, pad = 0) {
      const r = el.getBoundingClientRect();
      return clientX >= r.left - pad && clientX <= r.right + pad && clientY >= r.top - pad && clientY <= r.bottom + pad;
    }

    function initTutorialDrag() {
      const map = document.getElementById("tutorialMap");
      const svg = document.getElementById("tutorialSvg");
      const a = document.getElementById("tutA");
      const b = document.getElementById("tutB");
      const dot = document.getElementById("tutDot");
      let temp = null, dragging = false, start = null;

      a.addEventListener("pointerdown", e => {
        dragging = true;
        a.setPointerCapture(e.pointerId);
        start = centerOf(a, map);
        temp = document.createElementNS("http://www.w3.org/2000/svg", "line");
        temp.setAttribute("class", "temp");
        temp.setAttribute("x1", start.x);
        temp.setAttribute("y1", start.y);
        temp.setAttribute("x2", start.x);
        temp.setAttribute("y2", start.y);
        svg.appendChild(temp);
      });

      a.addEventListener("pointermove", e => {
        if (!dragging || !temp) return;
        const mb = map.getBoundingClientRect();
        temp.setAttribute("x2", e.clientX - mb.left);
        temp.setAttribute("y2", e.clientY - mb.top);
      });

      a.addEventListener("pointerup", e => {
        if (!dragging) return;
        dragging = false;
        if (pointIn(b, e.clientX, e.clientY, 24)) {
          temp.remove();
          const end = centerOf(b, map);
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", start.x);
          line.setAttribute("y1", start.y);
          line.setAttribute("x2", end.x);
          line.setAttribute("y2", end.y);
          svg.appendChild(line);
          b.classList.remove("target");
          b.classList.add("done");
          dot.style.left = start.x - 7 + "px";
          dot.style.top = start.y - 7 + "px";
          dot.style.opacity = 1;
          dot.animate([
            { left: start.x - 7 + "px", top: start.y - 7 + "px", opacity: 1 },
            { left: end.x - 7 + "px", top: end.y - 7 + "px", opacity: 1 }
          ], { duration: 650, easing: "ease-in-out", fill: "forwards" });
          document.getElementById("tutorialNext").style.display = "grid";
          toast("连接成功");
        } else {
          if (temp) temp.remove();
          toast("拖到目标节点松手");
        }
      });
    }

    function initLevel1() {
      const seq = ["dorm", "relay", "library"];
      const map = document.getElementById("g1Map");
      const svg = document.getElementById("g1Svg");
      const timer = document.getElementById("g1Timer");
      const interval = setInterval(() => {
        if (state.page !== "level1") return clearInterval(interval);
        timer.textContent = String(Math.floor((Date.now() - state.game1.startedAt) / 1000)).padStart(2, "0");
      }, 300);

      let dragging = false, temp = null, start = null, currentEl = null;

      map.querySelectorAll(".node").forEach(node => {
        node.addEventListener("pointerdown", e => {
          const expected = seq[state.game1.step];
          if (node.dataset.node !== expected) return;
          dragging = true;
          currentEl = node;
          node.setPointerCapture(e.pointerId);
          start = centerOf(node, map);
          temp = document.createElementNS("http://www.w3.org/2000/svg", "line");
          temp.setAttribute("class", "temp");
          temp.setAttribute("x1", start.x);
          temp.setAttribute("y1", start.y);
          temp.setAttribute("x2", start.x);
          temp.setAttribute("y2", start.y);
          svg.appendChild(temp);
        });

        node.addEventListener("pointermove", e => {
          if (!dragging || !temp) return;
          const mb = map.getBoundingClientRect();
          temp.setAttribute("x2", e.clientX - mb.left);
          temp.setAttribute("y2", e.clientY - mb.top);
        });

        node.addEventListener("pointerup", e => {
          if (!dragging) return;
          dragging = false;
          const targetName = seq[state.game1.step + 1];
          const target = map.querySelector(`[data-node="${targetName}"]`);
          if (target && pointIn(target, e.clientX, e.clientY, 26)) {
            temp.remove();
            const end = centerOf(target, map);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", start.x);
            line.setAttribute("y1", start.y);
            line.setAttribute("x2", end.x);
            line.setAttribute("y2", end.y);
            svg.appendChild(line);
            currentEl.classList.remove("active");
            currentEl.classList.add("done");
            target.classList.remove("target");
            target.classList.add("active");
            state.game1.step++;
            state.metrics.lineSuccess++;
            state.metrics.totalMessages++;
            if (state.game1.step === 1) {
              map.querySelector('[data-node="library"]').classList.add("target");

              document.getElementById("g1Next").style.display = "grid";
              toast("资料成功送达");
            }
          } else {
            if (temp) temp.remove();
            toast("信号掉线，重新连接");
          }
        });
      });
    }

    function initDecodeGame() {
      const stage = document.getElementById("decodeStage");
      const orb = document.getElementById("noiseOrb");
      const bank = document.getElementById("keywordBank");
      const meter = document.getElementById("decodeMeter");
      let scratching = false;

      function addTrail(x, y) {
        const r = stage.getBoundingClientRect();
        const t = document.createElement("div");
        t.className = "scratch-trail";
        t.style.left = (x - r.left) + "px";
        t.style.top = (y - r.top) + "px";
        stage.appendChild(t);
        setTimeout(() => t.remove(), 460);
      }

      function scratch(e) {
        if (!scratching || state.game2.revealed) return;
        if (!pointIn(orb, e.clientX, e.clientY, 10)) return;
        state.game2.scratch = Math.min(100, state.game2.scratch + 5);
        meter.style.setProperty("--v", state.game2.scratch + "%");
        addTrail(e.clientX, e.clientY);
        if (state.game2.scratch >= 100) {
          state.game2.revealed = true;
          orb.style.display = "none";
          bank.classList.add("show");
          toast("关键词已显现");
          initKeywordDrag();
        }
      }

      orb.addEventListener("pointerdown", e => {
        scratching = true;
        orb.setPointerCapture(e.pointerId);
        scratch(e);
      });
      orb.addEventListener("pointermove", scratch);
      orb.addEventListener("pointerup", () => scratching = false);
    }

    function initKeywordDrag() {
      const stage = document.getElementById("decodeStage");
      const slots = Array.from(document.querySelectorAll(".slot"));
      const order = ["选题", "文献", "摘要", "润色"];

      document.querySelectorAll(".key-chip").forEach(chip => {
        let dragging = false, dx = 0, dy = 0, origin = null;

        chip.addEventListener("pointerdown", e => {
          if (chip.classList.contains("locked")) return;
          dragging = true;
          chip.setPointerCapture(e.pointerId);
          const r = chip.getBoundingClientRect();
          origin = { left: chip.style.left, top: chip.style.top };
          dx = e.clientX - r.left;
          dy = e.clientY - r.top;
          chip.style.zIndex = 30;
        });

        chip.addEventListener("pointermove", e => {
          if (!dragging) return;
          const sr = stage.getBoundingClientRect();
          chip.style.left = (e.clientX - sr.left - dx) + "px";
          chip.style.top = (e.clientY - sr.top - dy) + "px";
        });

        chip.addEventListener("pointerup", e => {
          if (!dragging) return;
          dragging = false;
          chip.style.zIndex = 12;

          const nextIndex = state.game2.slots.length;
          const currentSlot = slots[nextIndex];
          const expected = order[nextIndex];

          if (!currentSlot) return;
          if (pointIn(currentSlot, e.clientX, e.clientY, 14)) {
            const key = chip.dataset.key;
            if (key === expected) {
              currentSlot.textContent = key;
              currentSlot.classList.add("filled");
              chip.classList.add("locked");
              chip.style.left = "calc(50% - 39px)";
              chip.style.top = "calc(100% - 58px)";
              state.game2.slots.push(key);
              state.metrics.studyCorrect++;
              state.metrics.totalMessages++;
              toast("学习节点接通");

              if (state.game2.slots.length === 4) {
                finishDecodeGame();
              }
            } else {
              chip.style.left = origin.left;
              chip.style.top = origin.top;
              state.metrics.studyWrong++;
              toast(chip.classList.contains("bad") ? "这是噪声信号" : "顺序错了，信号断开");
            }
          } else {
            chip.style.left = origin.left;
            chip.style.top = origin.top;
          }
        });
      });
    }

    function finishDecodeGame() {
      state.game2.done = true;
      document.getElementById("decodedReply").classList.add("show");
      document.getElementById("g2Copy").textContent = "通通校园：混乱求助已被破译成清楚路径，学习信号成功送达。";
      document.getElementById("g2Next").style.display = "grid";

    function startRhythm(e) {
      e.stopPropagation();
      if (state.game3.started) return;
      state.game3.started = true;
      document.getElementById("g3Start").style.display = "none";

    function spawnBeat() {
      if (state.game3.spawned >= 10) {
        clearInterval(state.game3.timer);
        setTimeout(finishRhythm, 1250);
        return;
      }
      const stage = document.getElementById("rhythmStage");
      if (!stage) return;
      const beat = document.createElement("div");
      beat.className = "beat";
      beat.dataset.birth = Date.now();
      const offset = [-54, -28, 0, 28, 54][state.game3.spawned % 5];
      beat.style.marginLeft = (offset - 19) + "px";
      stage.appendChild(beat);
      state.game3.activeBeat = beat;
      state.game3.spawned++;
      document.getElementById("g3Count").textContent = `${state.game3.spawned}/10`;
      setTimeout(() => {
        if (beat.parentNode) {
          beat.remove();
          state.metrics.rhythmMiss++;
        }
      }, 1260);
    }

    function tapRhythm() {
      if (!state.game3.started || state.game3.done) return;
      const beat = state.game3.activeBeat;
      if (!beat || !beat.parentNode) {
        toast("等节奏点落下");
        return;
      }
      const birth = Number(beat.dataset.birth);
      const diff = Math.abs(Date.now() - birth - 1020);
      if (diff < 280) {
        state.metrics.rhythmHits++;
        state.metrics.totalMessages++;
        beat.remove();
        state.game3.activeBeat = null;
        document.getElementById("combo").textContent = "连击 " + state.metrics.rhythmHits;
        const face = document.getElementById("videoFace");
        face.textContent = ["🎤","✨","🎬","🔥","🚀"][state.metrics.rhythmHits % 5];
        face.animate([
          { transform: "scale(1)" },
          { transform: "scale(1.18)" },
          { transform: "scale(1)" }
        ], { duration: 240 });
      } else {
        toast("再准一点");
      }
    }

    function finishRhythm() {
      if (state.game3.done) return;
      state.game3.done = true;
      document.getElementById("g3Copy").textContent = `AI视频彩铃：你点亮了 ${state.metrics.rhythmHits} 次表达信号，社团招新热度已扩散。`;
      document.getElementById("g3Next").style.display = "grid";
      toast("表达信号已送达");
    }

    function initGraduationRelay() {
      const stage = document.getElementById("gradStage");
      const svg = document.getElementById("gradSvg");
      const finalHold = document.getElementById("finalHold");
      const holdCircle = document.getElementById("holdCircle");

      function connectAvatar(el) {
        const sr = stage.getBoundingClientRect();
        const ar = el.getBoundingClientRect();
        const x = ar.left + ar.width / 2 - sr.left;
        const y = ar.top + ar.height / 2 - sr.top;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x);
        line.setAttribute("y1", y);
        line.setAttribute("x2", sr.width / 2);
        line.setAttribute("y2", 28);
        svg.appendChild(line);
      }

      document.querySelectorAll(".msg-card").forEach(card => {
        let dragging = false, dx = 0, dy = 0, origin = null;

        card.addEventListener("pointerdown", e => {
          if (card.classList.contains("done")) return;
          dragging = true;
          card.setPointerCapture(e.pointerId);
          const r = card.getBoundingClientRect();
          const sr = stage.getBoundingClientRect();
          origin = {
            left: r.left - sr.left + "px",
            top: r.top - sr.top + "px",
            position: card.style.position,
            gridColumn: card.style.gridColumn
          };
          dx = e.clientX - r.left;
          dy = e.clientY - r.top;
          card.style.position = "absolute";
          card.style.width = r.width + "px";
          card.style.left = origin.left;
          card.style.top = origin.top;
          card.style.gridColumn = "auto";
          card.style.zIndex = 40;
        });

        card.addEventListener("pointermove", e => {
          if (!dragging) return;
          const sr = stage.getBoundingClientRect();
          card.style.left = (e.clientX - sr.left - dx) + "px";
          card.style.top = (e.clientY - sr.top - dy) + "px";
        });

        card.addEventListener("pointerup", e => {
          if (!dragging) return;
          dragging = false;
          card.style.zIndex = 15;

          const target = document.querySelector(`.avatar[data-person="${card.dataset.to}"]`);
          if (target && pointIn(target, e.clientX, e.clientY, 16)) {
            target.classList.add("done");
            connectAvatar(target);
            card.classList.add("done");
            card.style.left = "50%";
            card.style.top = "205px";
            card.style.transform = "translateX(-50%) scale(.86)";
            state.game4.delivered.push(card.dataset.to);
            state.metrics.uploadCount++;
            state.metrics.totalMessages++;
            document.getElementById("g4Count").textContent = `${state.game4.delivered.length}/5`;
            toast("留言已送达");

            if (state.game4.delivered.length >= 5) {
              document.getElementById("g4Copy").textContent = "联通云盘 × 青少年专区：合照、留言和下一站入口已连接。";
              setTimeout(() => finalHold.classList.add("show"), 500);
            }
          } else {
            // 回到消息池附近，避免卡片脱离布局后位置错乱
            card.style.position = "relative";
            card.style.width = "";
            card.style.left = "";
            card.style.top = "";
            card.style.transform = "";
            card.style.gridColumn = origin.gridColumn || "";
            toast("TA愣了一下：这句话好像不是给我的");
          }
        });
      });

      function startHold(e) {
        e.preventDefault();
        if (state.game4.holding) return;
        state.game4.holding = true;
        state.game4.holdProgress = 0;
        holdCircle.style.setProperty("--hold", "0%");
        state.game4.holdTimer = setInterval(() => {
          state.game4.holdProgress += 4;
          holdCircle.style.setProperty("--hold", state.game4.holdProgress + "%");
          if (state.game4.holdProgress >= 100) {
            clearInterval(state.game4.holdTimer);
            state.game4.holdTimer = null;
            state.game4.holding = false;
            holdCircle.querySelector("span").textContent = "已送达";
            state.metrics.totalMessages++;
            document.getElementById("g4Next").style.display = "grid";
            toast("这一程没有断线");
          }
        }, 120);
      }

      function cancelHold() {
        if (!state.game4.holding) return;
        state.game4.holding = false;
        clearInterval(state.game4.holdTimer);
        state.game4.holdTimer = null;
        state.game4.holdProgress = 0;
        holdCircle.style.setProperty("--hold", "0%");
        toast("再多停一秒，信号还没送到");
      }

      holdCircle.addEventListener("pointerdown", startHold);
      holdCircle.addEventListener("pointerup", cancelHold);
      holdCircle.addEventListener("pointerleave", cancelHold);
      holdCircle.addEventListener("pointercancel", cancelHold);
    }

    function getResultKey() {
      const serviceScore = state.metrics.lineSuccess * 11 + Math.max(0, 18 - state.metrics.lineTime) + Math.max(0, 10 - state.metrics.studyWrong * 3);
      const cloudScore = state.metrics.lineSuccess * 8 + state.metrics.uploadCount * 7;
      const studyScore = state.metrics.studyCorrect * 12 - state.metrics.studyWrong * 3;
      const socialScore = state.metrics.rhythmHits * 8;
      const memoryScore = state.metrics.uploadCount * 14;

      const scores = {
        speed: serviceScore,
        cloud: Math.max(cloudScore, studyScore),
        social: socialScore,
        memory: memoryScore
      };

      const entries = Object.entries(scores).sort((a,b) => b[1] - a[1]);
      return entries[0][0];
    }

    function getResult() {
      return results[getResultKey()];
    }

    function copyShare() {
      const r = getResult();
      const text = `我在联通沃派《信号不要断》里生成了「${r.title}」：${r.poster} 一起把校园里的消息送达。`;
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => toast("分享文案已复制"));
      } else {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        toast("分享文案已复制");
      }
    }

    function goOfficial() {
      window.location.href = OFFICIAL_URL;
    }

    function resetAll() {
      clearTimers();
      state.page = "cover";
      state.pageIndex = 0;
      state.metrics = {
        lineSuccess: 0,
        lineTime: 0,
        studyCorrect: 0,
        studyWrong: 0,
        rhythmHits: 0,
        rhythmMiss: 0,
        uploadCount: 0,
        totalMessages: 0
      };
      state.game1 = { step: 0, startedAt: 0, lines: [] };
      state.game2 = { scratch: 0, revealed: false, slots: [], done: false };
      state.game3 = { started: false, spawned: 0, activeBeat: null, timer: null, done: false };
      state.game4 = { delivered: [], holding: false, holdTimer: null, holdProgress: 0 };
      render();
    }

    render();
  </script>
</body>
</html>
